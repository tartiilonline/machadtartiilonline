<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machadka Tartiiil Online</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#f7f7f7;
}

/* HEADER */
header{
  background:#800020;
  color:white;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid white;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-size:14px;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#800020,#FF8C00);
  color:white;
  text-align:center;
  padding:70px 20px;
}

.hero h1{
  font-size:38px;
}

/* SECTION */
section{
  padding:50px 20px;
}

.title{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.gallery img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* FOOTER */
footer{
  background:#800020;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.jpg" alt="logo">
    <h3>Machadka Tartiiil</h3>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Machadka Tartiiil Online</h1>
  <p>Barashada Qur'aanka & Tajwiidka</p>
</div>

<!-- GALLERY SECTION -->
<section id="gallery">
  <div class="title">Sawirrada Machadka</div>

  <div class="gallery">

    <img src="img1.jpg" alt="class">
    <img src="img2.jpg" alt="students">
    <img src="img3.jpg" alt="teacher">
    <img src="img4.jpg" alt="quran">
    <img src="img5.jpg" alt="learning">
    <img src="img6.jpg" alt="online class">

  </div>
</section>

<footer>
© 2026 Machadka Tartiiil Online
</footer>

</body>
</html>
</body>
</html>
